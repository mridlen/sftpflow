# ============================================================
# docker/compose.test.yml — SFTPflow integration test environment
# ============================================================
#
# Stood up by `make test-up`, torn down by `make test-down`.
# Intended to run under WSL2 on the developer's Windows host.
#
# Services:
#   sftpflow-server  - the thing we are actually testing. Runs sshd
#                      + sftpflowd; the CLI on the host dials it via
#                      `ssh -p 2222 sftpflow@localhost`.
#   sftp-peer-a      - atmoz/sftp, a "remote" SFTP server a feed can
#                      point at as source or destination.
#   sftp-peer-b      - another atmoz/sftp, so multi-peer feeds are
#                      exercisable without spinning up more services.
#   mailhog          - catches outbound SMTP for the upcoming email
#                      nextstep (milestone 8+). Running it now means
#                      we don't have to revisit compose later.
#
# Port map (host -> container):
#   2222 -> sftpflow-server:22   (SSH/RPC to the daemon)
#   2201 -> sftp-peer-a:22       (SFTP peer A)
#   2202 -> sftp-peer-b:22       (SFTP peer B)
#   1025 -> mailhog:1025         (SMTP for feed output)
#   8025 -> mailhog:8025         (MailHog web UI)
#
# Everything shares the `sftpflow-test` network, so service-to-service
# traffic (the daemon talking to an SFTP peer) uses the service name
# as hostname (e.g. "sftp-peer-a") on port 22.

name: sftpflow-test

services:

  # ------------------------------------------------------------
  # sftpflow-server: sshd + sftpflowd + sftpflow-shell bridge
  # ------------------------------------------------------------
  sftpflow-server:
    build:
      # Build context is the repo root so the Dockerfile can COPY
      # the whole Cargo workspace. The Dockerfile itself lives in
      # ./docker/ to keep the root tidy.
      context: ..
      dockerfile: docker/Dockerfile.sftpflow-server
    container_name: sftpflow-test-server
    ports:
      - "2222:22"
    volumes:
      # Client public key -> seeded into sftpflow user's authorized_keys
      # on boot (see docker/entrypoint.sh). Generated by `make test-keygen`.
      - ./test-keys/id_ed25519.pub:/etc/sftpflow/authorized_keys:ro
      # Persist sshd host keys so the host's known_hosts stays stable
      # across `docker compose down && up`.
      - sftpflow-hostkeys:/etc/ssh/keys
      # Persist the daemon's config.yaml across container restarts.
      - sftpflow-config:/var/lib/sftpflow
    environment:
      - RUST_LOG=info
    networks:
      - sftpflow-test
    restart: unless-stopped

  # ------------------------------------------------------------
  # sftp-peer-a: atmoz/sftp with password "testpass"
  # ------------------------------------------------------------
  # The trailing argument list is atmoz's own syntax:
  #   username:password:uid:gid
  # With uid 1001 the files created by the sftp user match a typical
  # first non-root host user, which keeps bind-mount perms readable.
  sftp-peer-a:
    image: atmoz/sftp:alpine
    container_name: sftpflow-test-peer-a
    command: testuser:testpass:1001:1001
    ports:
      - "2201:22"
    volumes:
      # /home/testuser/upload is atmoz/sftp's chrooted write area.
      - sftp-peer-a-data:/home/testuser/upload
    networks:
      - sftpflow-test
    restart: unless-stopped

  # ------------------------------------------------------------
  # sftp-peer-b: identical to peer A, different storage
  # ------------------------------------------------------------
  sftp-peer-b:
    image: atmoz/sftp:alpine
    container_name: sftpflow-test-peer-b
    command: testuser:testpass:1001:1001
    ports:
      - "2202:22"
    volumes:
      - sftp-peer-b-data:/home/testuser/upload
    networks:
      - sftpflow-test
    restart: unless-stopped

  # ------------------------------------------------------------
  # mailhog: SMTP sink + web UI for the future email nextstep
  # ------------------------------------------------------------
  # Not used yet, but standing it up now means the compose file is
  # stable by the time milestone 8+ needs it. Web UI at :8025.
  mailhog:
    image: mailhog/mailhog:latest
    container_name: sftpflow-test-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - sftpflow-test
    restart: unless-stopped

# ------------------------------------------------------------
# Named volumes
# ------------------------------------------------------------
volumes:
  sftpflow-hostkeys:
  sftpflow-config:
  sftp-peer-a-data:
  sftp-peer-b-data:

# ------------------------------------------------------------
# Shared network (bridge) — service names resolve as hostnames
# ------------------------------------------------------------
networks:
  sftpflow-test:
    driver: bridge
